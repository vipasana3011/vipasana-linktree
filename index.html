<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0" />

  <title>Vipasana Linktree</title>

  <!-- SEO -->

  <meta
    name="description"
    content="Vipasana official links and socials" />

  <!-- Google Analytics -->

  <script async
    src="https://www.googletagmanager.com/gtag/js?id=G-S7023QWFM6">
  </script>

  <script>

    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }

    gtag('js', new Date());

    gtag('config', 'G-S7023QWFM6');

    function trackLink(platform) {

      gtag('event', 'click', {

        event_category: 'Links',
        event_label: platform

      });

    }

  </script>

  <!-- Fonts -->

  <link rel="preconnect"
    href="https://fonts.googleapis.com">

  <link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Font Awesome -->

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- CSS -->

  <link rel="stylesheet"
    href="style.css" />

</head>

<body>

  <!-- Main Card -->

  <main class="card">

    <!-- Top Glow -->

    <div class="top-blur"></div>

    <!-- Profile -->

    <img
      src="profile.pic.jpg"
      alt="Vipasana"
      class="profile-img">

    <!-- Heading -->

    <h1 class="name">
      Vipasana Linktree
    </h1>

    <p class="subtitle">
      All my links in one place
    </p>

    <!-- Links -->

    <div class="links">

      <!-- Portfolio -->

      <a
        href="https://vipasana-portfolio.vercel.app/"
        target="_blank"
        class="link"
        onclick="trackLink('Portfolio')">

        <div class="icon-box">

          <i class="fas fa-globe"></i>

        </div>

        <span>
          Portfolio
        </span>

        <i class="fas fa-arrow-right arrow"></i>

      </a>

      <!-- Email -->

      <a
        href="mailto:vipasana3011@gmail.com"
        class="link"
        onclick="trackLink('Email')">

        <div class="icon-box">

          <i class="fas fa-envelope"></i>

        </div>

        <span>
          Email
        </span>

        <i class="fas fa-arrow-right arrow"></i>

      </a>

      <!-- GitHub -->

      <a
        href="https://github.com/vipasana3011"
        target="_blank"
        class="link"
        onclick="trackLink('GitHub')">

        <div class="icon-box">

          <i class="fab fa-github"></i>

        </div>

        <span>
          GitHub
        </span>

        <i class="fas fa-arrow-right arrow"></i>

      </a>

      <!-- LinkedIn -->

      <a
        href="https://www.linkedin.com/in/vipasana"
        target="_blank"
        class="link"
        onclick="trackLink('LinkedIn')">

        <div class="icon-box">

          <i class="fab fa-linkedin-in"></i>

        </div>

        <span>
          LinkedIn
        </span>

        <i class="fas fa-arrow-right arrow"></i>

      </a>

      <!-- Instagram -->

      <a
        href="https://www.instagram.com/_vipasana_"
        target="_blank"
        class="link"
        onclick="trackLink('Instagram')">

        <div class="icon-box">

          <i class="fab fa-instagram"></i>

        </div>

        <span>
          Instagram
        </span>

        <i class="fas fa-arrow-right arrow"></i>

      </a>

      <!-- YouTube -->

      <a
        href="https://www.youtube.com/@vipasana30"
        target="_blank"
        class="link"
        onclick="trackLink('YouTube')">

        <div class="icon-box">

          <i class="fab fa-youtube"></i>

        </div>

        <span>
          YouTube
        </span>

        <i class="fas fa-arrow-right arrow"></i>

      </a>

      <!-- Snapchat -->

      <a
        href="https://www.snapchat.com/add/vipasana_30"
        target="_blank"
        class="link"
        onclick="trackLink('Snapchat')">

        <div class="icon-box">

          <i class="fab fa-snapchat-ghost"></i>

        </div>

        <span>
          Snapchat
        </span>

        <i class="fas fa-arrow-right arrow"></i>

      </a>

    </div>

  </main>

  <!-- JS -->

  <script src="script.js"></script>

</body>

</html>
