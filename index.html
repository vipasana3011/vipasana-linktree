<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Vipasana Linktree</title>

  <!-- SEO -->
  <meta name="description" content="Official links of Vipasana" />

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-S7023QWFM6"></script>

  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }

    gtag('js', new Date());

    gtag('config', 'G-S7023QWFM6');

    function trackLink(platform) {

      gtag('event', 'click', {
        event_category: 'Links',
        event_label: platform
      });

    }
  </script>

  <!-- Fonts -->

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Icons -->

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- CSS -->

  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <main class="card">

    <!-- Profile -->

    <img
      src="profile.pic.jpg"
      alt="Vipasana"
      class="profile-img">

    <h1 class="name">
      Vipasana Linktree
    </h1>

    <p class="subtitle">
      All my important links in one place
    </p>

    <!-- Links -->

    <div class="links">

      <a href="https://vipasana-portfolio.vercel.app/"
        class="link"
        target="_blank"
        onclick="trackLink('Portfolio')">

        <i class="fas fa-globe"></i>
        Portfolio

      </a>

      <a href="mailto:vipasana3011@gmail.com"
        class="link"
        onclick="trackLink('Mail')">

        <i class="fas fa-envelope"></i>
        Email

      </a>

      <a href="https://github.com/vipasana3011"
        class="link"
        target="_blank"
        onclick="trackLink('GitHub')">

        <i class="fab fa-github"></i>
        GitHub

      </a>

      <a href="https://www.linkedin.com/in/vipasana"
        class="link"
        target="_blank"
        onclick="trackLink('LinkedIn')">

        <i class="fab fa-linkedin"></i>
        LinkedIn

      </a>

      <a href="https://www.instagram.com/_vipasana_"
        class="link"
        target="_blank"
        onclick="trackLink('Instagram')">

        <i class="fab fa-instagram"></i>
        Instagram

      </a>

      <a href="https://www.youtube.com/@vipasana30"
        class="link"
        target="_blank"
        onclick="trackLink('YouTube')">

        <i class="fab fa-youtube"></i>
        YouTube

      </a>

    </div>

  </main>

  <script src="script.js"></script>

</body>

</html>
