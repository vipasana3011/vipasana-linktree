<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0" />

  <title>
    Vipasana Linktree
  </title>

  <!-- SEO -->

  <meta
    name="description"
    content="Official links of Vipasana" />

  <!-- Google Analytics -->

  <script async
    src="https://www.googletagmanager.com/gtag/js?id=G-S7023QWFM6">
  </script>

  <script>

    window.dataLayer =
      window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }

    gtag('js', new Date());

    gtag(
      'config',
      'G-S7023QWFM6'
    );

    function trackLink(platform) {

      gtag('event', 'click', {

        event_category: 'Links',

        event_label: platform

      });

    }

  </script>

  <!-- Fonts -->

  <link rel="preconnect"
    href="https://fonts.googleapis.com">

  <link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- Font Awesome -->

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- CSS -->

  <link rel="stylesheet"
    href="style.css" />

</head>

<body>

  <!-- Background Glow -->

  <div class="bg-glow glow1"></div>
  <div class="bg-glow glow2"></div>

  <!-- Main Card -->

  <main class="card">

    <!-- Top Bar -->

    <div class="top-bar">

      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>

    </div>

    <!-- Profile -->

    <div class="profile-wrap">

      <img
        src="profile.pic.jpg"
        alt="Vipasana"
        class="profile-img">

    </div>

    <!-- Heading -->

    <h1 class="name">
      Vipasana Linktree
    </h1>

    <p class="subtitle">
      Explore all my official links
    </p>

    <!-- WORK SECTION -->

    <div class="section-title">

      <span class="line"></span>

      <h2>
        Work
      </h2>

      <span class="line"></span>

    </div>

    <div class="links">

      <!-- Portfolio -->

      <a
        href="https://vipasana-portfolio.vercel.app/"
        target="_blank"
        class="link"
        onclick="trackLink('Portfolio')">

        <div class="icon-box portfolio">

          <i class="fas fa-globe"></i>

        </div>

        <div class="link-text">

          <h3>
            Portfolio
          </h3>

          <p>
            View my projects & work
          </p>

        </div>

        <i class="fas fa-arrow-right arrow"></i>

      </a>

      <!-- Email -->

      <a
        href="mailto:vipasana3011@gmail.com"
        class="link"
        onclick="trackLink('Email')">

        <div class="icon-box mail">

          <i class="fas fa-envelope"></i>

        </div>

        <div class="link-text">

          <h3>
            Email
          </h3>

          <p>
            Contact me directly
          </p>

        </div>

        <i class="fas fa-arrow-right arrow"></i>

      </a>

      <!-- GitHub -->

      <a
        href="https://github.com/vipasana3011"
        target="_blank"
        class="link"
        onclick="trackLink('GitHub')">

        <div class="icon-box github">

          <i class="fab fa-github"></i>

        </div>

        <div class="link-text">

          <h3>
            GitHub
          </h3>

          <p>
            Explore my repositories
          </p>

        </div>

        <i class="fas fa-arrow-right arrow"></i>

      </a>

      <!-- LinkedIn -->

      <a
        href="https://www.linkedin.com/in/vipasana"
        target="_blank"
        class="link"
        onclick="trackLink('LinkedIn')">

        <div class="icon-box linkedin">

          <i class="fab fa-linkedin-in"></i>

        </div>

        <div class="link-text">

          <h3>
            LinkedIn
          </h3>

          <p>
            Professional profile
          </p>

        </div>

        <i class="fas fa-arrow-right arrow"></i>

      </a>

    </div>

    <!-- SOCIAL SECTION -->

    <div class="section-title">

      <span class="line"></span>

      <h2>
        Social Links
      </h2>

      <span class="line"></span>

    </div>

    <div class="links">

      <!-- Instagram -->

      <a
        href="https://www.instagram.com/_vipasana_"
        target="_blank"
        class="link"
        onclick="trackLink('Instagram')">

        <div class="icon-box instagram">

          <i class="fab fa-instagram"></i>

        </div>

        <div class="link-text">

          <h3>
            Instagram
          </h3>

          <p>
            Lifestyle & updates
          </p>

        </div>

        <i class="fas fa-arrow-right arrow"></i>

      </a>

      <!-- YouTube -->

      <a
        href="https://www.youtube.com/@vipasana30"
        target="_blank"
        class="link"
        onclick="trackLink('YouTube')">

        <div class="icon-box youtube">

          <i class="fab fa-youtube"></i>

        </div>

        <div class="link-text">

          <h3>
            YouTube
          </h3>

          <p>
            Watch my content
          </p>

        </div>

        <i class="fas fa-arrow-right arrow"></i>

      </a>

      <!-- Snapchat -->

      <a
        href="https://www.snapchat.com/add/vipasana_30"
        target="_blank"
        class="link"
        onclick="trackLink('Snapchat')">

        <div class="icon-box snapchat">

          <i class="fab fa-snapchat-ghost"></i>

        </div>

        <div class="link-text">

          <h3>
            Snapchat
          </h3>

          <p>
            Connect with me here
          </p>

        </div>

        <i class="fas fa-arrow-right arrow"></i>

      </a>

    </div>

  </main>

  <!-- JS -->

  <script src="script.js"></script>

</body>

</html>
